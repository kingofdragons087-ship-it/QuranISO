<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القرآن الكريم - PWA</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="القرآن الكريم">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://files.catbox.moe/i5fnb8.jpg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0b1320; color: #e2e8f0; }
        
        #loading-screen { position: fixed; inset: 0; z-index: 9999; background: #0b1320; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .loader { width: 50px; height: 50px; border: 5px solid #1e293b; border-top: 5px solid #fbbf24; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .glass-panel { background: rgba(13, 27, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.15); }
        .glass-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; }
        .glass-card:hover { background: rgba(255,255,255,0.08); }
        .surah-name, .qari-name { color: #fcd34d; font-weight: 700; }
        .text-gold-500 { color: #fcd34d; }
        .qari-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 1.5rem; }
        .surah-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: 0.8rem; }
        .hidden-page { display: none !important; }
        .download-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.5rem; padding: 0.3rem 0.8rem; }
        
        .player-green { background: rgba(34, 197, 94, 0.3); backdrop-filter: blur(20px); border-top: 2px solid rgba(34, 197, 94, 0.5); padding: 16px 24px; }
        .player-green #btn-play-pause { background: #ef4444; color: #ffffff; box-shadow: 0 0 25px rgba(239, 68, 68, 0.6); border: 2px solid rgba(255, 255, 255, 0.3); width: 60px; height: 60px; font-size: 1.6rem; }
        .player-green .control-btn { color: #ffffff; font-size: 1.6rem; padding: 0.6rem; background: rgba(0, 0, 0, 0.4); border-radius: 50%; }
        .progress-track { height: 12px; background: rgba(0, 0, 0, 0.5); border-radius: 12px; cursor: pointer; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #fbbf24, #f59e0b); border-radius: 12px; width: 0%; transition: width 0.1s linear; }
        
        #toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); z-index: 9999; background: rgba(13, 27, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 1rem; padding: 0.75rem 1.5rem; color: #fcd34d; transition: opacity 0.4s ease; opacity: 0; display: flex; gap: 0.75rem; }
        #toast.show { opacity: 1; }
        
        .ayah-highlight { background: rgba(59,130,246,0.3); border-right: 4px solid #3b82f6; padding-right: 0.5rem; }
        .verse-text { color: #86efac; font-weight: 600; }
        .active-verse .verse-text { color: #a7f3d0; text-shadow: 0px 0px 20px rgba(134, 239, 172, 0.4); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.3); border-radius: 10px; }

        /* ---- شريط تثبيت الآيفون الجديد ---- */
        #ios-install-banner {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: none; align-items: center; gap: 12px;
            background: rgba(13, 27, 42, 0.95); backdrop-filter: blur(20px);
            padding: 12px 20px; border-radius: 50px;
            border: 1px solid rgba(251, 191, 36, 0.5);
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.2);
            width: 90%; max-width: 450px;
        }
        #ios-install-banner i { color: #fbbf24; font-size: 1.5rem; }
        #ios-install-banner span { color: #fff; font-size: 0.9rem; font-weight: bold; flex: 1; }
        #ios-install-banner button {
            background: #fbbf24; color: #0d1b2a; border: none;
            padding: 6px 14px; border-radius: 30px; font-weight: bold; font-size: 0.8rem; cursor: pointer;
        }
        #ios-install-banner button:hover { background: #fcd34d; }
    </style>
</head>
<body>
    
    <div id="loading-screen">
        <div class="loader"></div>
        <h2 class="mt-4 text-gold-500 text-xl font-bold">جاري تحميل التطبيق...</h2>
        <p class="text-xs text-slate-400 mt-2">القرآن الكريم - PWA</p>
    </div>

    <div id="toast"><i class="fa-solid fa-circle-check"></i> <span id="toast-message">تم الحفظ بنجاح</span></div>

    <!-- شريط تثبيت الآيفون الجديد -->
    <div id="ios-install-banner">
        <i class="fa-solid fa-mobile-screen-button"></i>
        <span>ثبّت التطبيق على شاشتك الرئيسية</span>
        <button onclick="showIosInstallGuide()">كيفية التثبيت</button>
    </div>

    <div class="flex flex-col min-h-screen">
        <header class="glass-panel sticky top-0 z-40 px-4 py-3 flex items-center justify-between shadow-lg">
            <div class="flex items-center gap-3">
                <img src="https://files.catbox.moe/i5fnb8.jpg" class="w-10 h-10 rounded-xl object-cover shadow-md">
                <h1 class="text-lg font-bold text-gold-500">القرآن الكريم</h1>
            </div>
            <div class="flex gap-2 items-center">
                <button onclick="goHome()" class="w-10 h-10 rounded-xl glass-card flex items-center justify-center text-gold-500"><i class="fa-solid fa-house"></i></button>
            </div>
        </header>

        <main class="flex-grow w-full max-w-7xl mx-auto px-4 pb-32" id="main-content">
            <div id="page-qari-grid">
                <div class="flex items-center justify-between mb-6"><h2 class="text-xl font-bold text-gold-500">اختر قارئك</h2><span class="text-xs text-slate-400">13 قارئًا</span></div>
                <div class="qari-grid" id="qari-grid-container"></div>
            </div>

            <div id="page-surah-list" class="hidden-page">
                <div class="flex items-center gap-4 mb-4 flex-wrap">
                    <img id="surah-qari-img" src="" class="w-16 h-16 rounded-2xl object-cover border-2 border-gold-500">
                    <div><h2 id="surah-qari-name" class="text-xl font-bold surah-name"></h2><p class="text-sm text-slate-400">اختر سورة للاستماع</p></div>
                </div>
                <input type="text" id="surah-search" oninput="filterSurahs()" placeholder="ابحث عن سورة..." class="w-full mb-4 p-3 bg-slate-900/50 border border-slate-700/50 rounded-2xl text-sm text-white">
                <div class="surah-grid" id="surah-grid-container"></div>
            </div>

            <div id="page-player" class="hidden-page">
                <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
                    <div class="flex items-center gap-3">
                        <img id="player-qari-img" src="" class="w-12 h-12 rounded-xl object-cover border border-gold-500/30">
                        <div><h2 id="player-surah-name" class="text-lg font-bold surah-name"></h2><p id="player-qari-name" class="text-xs text-slate-400 qari-name"></p></div>
                    </div>
                </div>
                <div id="player-verse-container" class="space-y-3 max-h-[60vh] overflow-y-auto pr-2"></div>
            </div>
        </main>

        <footer class="fixed bottom-0 left-0 right-0 z-50 border-t border-green-500/40 shadow-2xl transition-all duration-500 translate-y-full player-green" id="floating-player">
            <div class="max-w-7xl mx-auto flex items-center gap-4 justify-between">
                <div class="flex items-center gap-3">
                    <img id="player-cover" src="" class="w-12 h-12 rounded-xl object-cover border-2 border-white/20">
                    <div><h4 id="player-title" class="text-sm font-bold text-white">سورة الفاتحة</h4><p id="player-subtitle" class="text-xs text-green-200">بصوت القارئ</p></div>
                </div>
                <div class="flex items-center gap-3 flex-1 justify-center">
                    <button onclick="toggleShuffle()" id="btn-shuffle" class="control-btn"><i class="fa-solid fa-shuffle"></i></button>
                    <button onclick="playPrev()" class="control-btn"><i class="fa-solid fa-backward-step"></i></button>
                    <button onclick="togglePlayPause()" id="btn-play-pause" class="rounded-full flex items-center justify-center"><i class="fa-solid fa-play" id="play-pause-icon"></i></button>
                    <button onclick="playNext()" class="control-btn"><i class="fa-solid fa-forward-step"></i></button>
                    <button onclick="toggleRepeat()" id="btn-repeat" class="control-btn"><i class="fa-solid fa-repeat"></i></button>
                </div>
                <div class="flex items-center gap-2 text-xs font-bold text-white/80">
                    <span id="player-time-current">00:00</span>
                    <div class="progress-track flex-1" onclick="seekAudio(event)"><div class="progress-fill" id="progress-bar"></div></div>
                    <span id="player-time-total">00:00</span>
                </div>
            </div>
        </footer>

        <audio id="audio-engine" preload="auto" onended="handleAudioEnded()"></audio>
    </div>

    <!-- ================= السكربت ================= -->
    <script>
        const qariList = [
            { id: "afs", name: "مشاري العفاسي", img: "https://files.catbox.moe/x78lu5.jpeg", server: "server8" },
            { id: "wdee3", name: "وديع اليمني", img: "https://files.catbox.moe/10ejq9.jpeg", server: "server6" },
            { id: "abkr", name: "إدريس أبكر", img: "https://files.catbox.moe/yn8e5q.jpeg", server: "server6" },
            { id: "lhdan", name: "محمد اللحيدان", img: "https://files.catbox.moe/q3gsew.jpeg", server: "server8", special: {25:"https://files.catbox.moe/f0rcv0.mp3",50:"https://files.catbox.moe/jcgxff.mp3",69:"https://files.catbox.moe/i7mfj5.mp3",75:"https://files.catbox.moe/xsp6de.mp3"} },
            { id: "islam", name: "إسلام صبحي", img: "https://files.catbox.moe/c2da1r.jpeg", server: "server14", special: {1:"https://server14.mp3quran.net/islam/Rewayat-Hafs-A-n-Assem/001.mp3"} },
            { id: "ajm", name: "أحمد العجمي", img: "https://files.catbox.moe/sejct2.jpeg", server: "server10" },
            { id: "nufais", name: "أحمد النفيس", img: "https://files.catbox.moe/g7uz7x.jpeg", server: "server16", special: {1:"https://server16.mp3quran.net/nufais/Rewayat-Hafs-A-n-Assem/001.mp3"} },
            { id: "jleel", name: "خالد الجليل", img: "https://files.catbox.moe/ldy2ae.jpeg", server: "server10", special: {40:"https://files.catbox.moe/myrc49.mp3",50:"https://files.catbox.moe/b8aotg.mp3"} },
            { id: "maher", name: "ماهر المعيقلي", img: "https://files.catbox.moe/kmaxtd.jpeg", server: "server12" },
            { id: "yasser", name: "ياسر الدوسري", img: "https://files.catbox.moe/qscsn2.jpeg", server: "server11", special: {50:"https://files.catbox.moe/98nyfv.mp3",69:"https://files.catbox.moe/mtjvsc.mp3"} },
            { id: "basit", name: "عبد الباسط عبد الصمد", img: "https://files.catbox.moe/uta72i.jpeg", server: "server7" },
            { id: "frs_a", name: "فارس عباد", img: "https://files.catbox.moe/4gft1s.jpeg", server: "server8" },
            { id: "s_gmd", name: "سعد الغامدي", img: "https://files.catbox.moe/9ki75x.jpeg", server: "server7" }
        ];

        const surahList = [];
        for (let i = 1; i <= 114; i++) {
            const names = {1:"الفاتحة",2:"البقرة",3:"آل عمران",4:"النساء",5:"المائدة",6:"الأنعام",7:"الأعراف",8:"الأنفال",9:"التوبة",10:"يونس",11:"هود",12:"يوسف",13:"الرعد",14:"إبراهيم",15:"الحجر",16:"النحل",17:"الإسراء",18:"الكهف",19:"مريم",20:"طه",21:"الأنبياء",22:"الحج",23:"المؤمنون",24:"النور",25:"الفرقان",26:"الشعراء",27:"النمل",28:"القصص",29:"العنكبوت",30:"الروم",31:"لقمان",32:"السجدة",33:"الأحزاب",34:"سبأ",35:"فاطر",36:"يس",37:"الصافات",38:"ص",39:"الزمر",40:"غافر",41:"فصلت",42:"الشورى",43:"الزخرف",44:"الدخان",45:"الجاثية",46:"الأحقاف",47:"محمد",48:"الفتح",49:"الحجرات",50:"ق",51:"الذاريات",52:"الطور",53:"النجم",54:"القمر",55:"الرحمن",56:"الواقعة",57:"الحديد",58:"المجادلة",59:"الحشر",60:"الممتحنة",61:"الصف",62:"الجمعة",63:"المنافقون",64:"التغابن",65:"الطلاق",66:"التحريم",67:"الملك",68:"القلم",69:"الحاقة",70:"المعارج",71:"نوح",72:"الجن",73:"المزمل",74:"المدثر",75:"القيامة",76:"الإنسان",77:"المرسلات",78:"النبأ",79:"النازعات",80:"عبس",81:"التكوير",82:"الانفطار",83:"المطففين",84:"الانشقاق",85:"البروج",86:"الطارق",87:"الأعلى",88:"الغاشية",89:"الفجر",90:"البلد",91:"الشمس",92:"الليل",93:"الضحى",94:"الشرح",95:"التين",96:"العلق",97:"القدر",98:"البينة",99:"الزلزلة",100:"العاديات",101:"القارعة",102:"التكاثر",103:"العصر",104:"الهمزة",105:"الفيل",106:"قريش",107:"الماعون",108:"الكوثر",109:"الكافرون",110:"النصر",111:"المسد",112:"الإخلاص",113:"الفلق",114:"الناس"};
            const counts = {1:7,2:286,3:200,4:176,5:120,6:165,7:206,8:75,9:129,10:109,11:123,12:111,13:43,14:52,15:99,16:128,17:111,18:110,19:98,20:135,21:112,22:78,23:118,24:64,25:77,26:227,27:93,28:88,29:69,30:60,31:34,32:30,33:73,34:54,35:45,36:83,37:182,38:88,39:75,40:85,41:54,42:53,43:89,44:59,45:37,46:35,47:38,48:29,49:18,50:45,51:60,52:49,53:62,54:55,55:78,56:96,57:29,58:22,59:24,60:13,61:14,62:11,63:11,64:18,65:12,66:12,67:30,68:52,69:52,70:44,71:28,72:28,73:20,74:56,75:40,76:31,77:50,78:40,79:46,80:42,81:29,82:19,83:36,84:25,85:22,86:17,87:19,88:26,89:30,90:20,91:15,92:21,93:11,94:8,95:8,96:19,97:5,98:8,99:8,100:11,101:11,102:8,103:3,104:9,105:5,106:4,107:7,108:3,109:6,110:3,111:5,112:4,113:5,114:6};
            surahList.push({ id: i, name: names[i] || `سورة ${i}`, verses: counts[i] || 7 });
        }

        let currentQari = null, currentSurah = null, currentAyah = 1;
        let isPlaying = false, isBuffering = false, isShuffle = false, isRepeat = false;
        let ayahTimestamps = [], verseTexts = [];
        const audio = document.getElementById('audio-engine');
        const floatingPlayer = document.getElementById('floating-player');

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; }, 500);
            }, 1000);
            renderQariGrid();
            setupAudioListeners();
            checkForIOS();
        });

        function checkForIOS() {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            const isStandalone = window.navigator.standalone;
            if (isIOS && !isStandalone) {
                document.getElementById('ios-install-banner').style.display = 'flex';
            }
        }

        function showIosInstallGuide() {
            showToast('اضغط على زر المشاركة (مربع مع سهم) ثم اختر "إضافة إلى الشاشة الرئيسية"');
            document.getElementById('ios-install-banner').style.display = 'none';
        }

        function showToast(message) {
            document.getElementById('toast-message').textContent = message;
            document.getElementById('toast').classList.add('show');
            clearTimeout(document.getElementById('toast')._timer);
            document.getElementById('toast')._timer = setTimeout(() => document.getElementById('toast').classList.remove('show'), 4000);
        }

        function showPage(pageId) {
            document.querySelectorAll('#main-content > div').forEach(el => el.classList.add('hidden-page'));
            document.getElementById('page-' + pageId).classList.remove('hidden-page');
        }

        function goHome() {
            showPage('qari-grid');
            if (!audio.paused) { audio.pause(); isPlaying = false; }
            floatingPlayer.classList.add('translate-y-full');
            currentSurah = null;
        }

        function renderQariGrid() {
            const container = document.getElementById('qari-grid-container');
            container.innerHTML = '';
            qariList.forEach(q => {
                const card = document.createElement('div');
                card.className = 'glass-card qari-card rounded-2xl p-4 flex flex-col items-center cursor-pointer relative';
                card.innerHTML = `<img src="${q.img}" class="w-20 h-20 rounded-full object-cover border-2 border-gold-500/30 shadow-lg mb-2"><h4 class="text-sm font-bold text-center qari-name">${q.name}</h4>`;
                card.onclick = () => openSurahList(q.id);
                container.appendChild(card);
            });
            showPage('qari-grid');
        }

        function openSurahList(qariId) {
            currentQari = qariList.find(q => q.id === qariId);
            document.getElementById('surah-qari-img').src = currentQari.img;
            document.getElementById('surah-qari-name').textContent = currentQari.name;
            renderSurahGrid('');
            showPage('surah-list');
        }

        function renderSurahGrid(filter) {
            const container = document.getElementById('surah-grid-container');
            container.innerHTML = '';
            const list = filter ? surahList.filter(s => s.name.includes(filter)) : surahList;
            list.forEach(s => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-xl p-3 text-center cursor-pointer hover:bg-gold-500/10 relative';
                card.innerHTML = `<div class="text-xs text-gold-500 font-bold">${s.id}</div><div class="text-sm font-bold surah-name">${s.name}</div><div class="text-[10px] text-slate-400">${s.verses} آية</div>`;
                card.onclick = () => openPlayer(s.id);
                container.appendChild(card);
            });
        }

        function filterSurahs() {
            renderSurahGrid(document.getElementById('surah-search').value.trim());
        }

        async function openPlayer(surahId) {
            currentSurah = surahList.find(s => s.id === surahId);
            currentAyah = 1;
            document.getElementById('player-qari-img').src = currentQari.img;
            document.getElementById('player-qari-name').textContent = currentQari.name;
            document.getElementById('player-surah-name').textContent = `سورة ${currentSurah.name}`;
            showPage('player');
            await loadVerseTexts(currentSurah.id);
            renderVerses();
            await playSurahAudio(currentSurah.id);
        }

        async function loadVerseTexts(surahId) {
            const cacheKey = `verses_${surahId}`;
            const cached = localStorage.getItem(cacheKey);
            if (cached) { verseTexts = JSON.parse(cached); return; }
            try {
                const resp = await fetch(`https://api.quran.com/api/v4/quran/verses/uthmani?chapter_number=${surahId}`);
                const data = await resp.json();
                verseTexts = data.verses.map(v => v.text_uthmani);
                localStorage.setItem(cacheKey, JSON.stringify(verseTexts));
            } catch (e) { verseTexts = Array(getVerseCount(surahId)).fill('نص الآية غير متوفر'); }
        }

        function getVerseCount(id) { return surahList.find(s => s.id === id).verses; }

        function renderVerses() {
            const container = document.getElementById('player-verse-container');
            container.innerHTML = '';
            for (let i = 0; i < getVerseCount(currentSurah.id); i++) {
                const div = document.createElement('div');
                div.className = `verse-container`;
                div.id = `verse-${i+1}`;
                div.innerHTML = `<div class="flex items-start gap-2"><span class="ayah-number text-xs font-bold w-6">${i+1}</span><span class="verse-text text-base font-amiri">${verseTexts[i] || '...'}</span></div>`;
                container.appendChild(div);
            }
            highlightVerse(1);
        }

        function highlightVerse(ayahNum) {
            document.querySelectorAll('.verse-container').forEach(el => el.classList.remove('active-verse'));
            const el = document.getElementById(`verse-${ayahNum}`);
            if (el) { el.classList.add('active-verse'); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
        }

        function getAudioUrl(qari, surahId) {
            if (qari.special && qari.special[surahId]) return qari.special[surahId];
            if (qari.special && qari.special[1]) {
                const urlParts = qari.special[1].split('/');
                return urlParts.slice(0, -1).join('/') + '/' + String(surahId).padStart(3,'0') + '.mp3';
            }
            return `https://${qari.server}.mp3quran.net/${qari.id}/${String(surahId).padStart(3,'0')}.mp3`;
        }

        async function playSurahAudio(surahId) {
            const url = getAudioUrl(currentQari, surahId);
            audio.src = url;
            floatingPlayer.classList.remove('translate-y-full');
            document.getElementById('player-cover').src = currentQari.img;
            document.getElementById('player-title').textContent = `سورة ${currentSurah.name}`;
            document.getElementById('player-subtitle').textContent = `بصوت ${currentQari.name}`;
            try { await audio.play(); isPlaying = true; updatePlayPauseUI(); } catch (e) {}
        }

        function togglePlayPause() {
            if (!currentSurah) return;
            if (isPlaying) { audio.pause(); isPlaying = false; }
            else { audio.play().then(() => { isPlaying = true; updatePlayPauseUI(); }).catch(() => {}); }
            updatePlayPauseUI();
        }

        function playNext() {
            if (!currentSurah) return;
            let nextId = isShuffle ? Math.floor(Math.random() * 114) + 1 : (currentSurah.id + 1 > 114 ? 1 : currentSurah.id + 1);
            currentAyah = 1; openPlayer(nextId);
        }

        function playPrev() {
            if (!currentSurah) return;
            let prevId = currentSurah.id - 1 < 1 ? 114 : currentSurah.id - 1;
            currentAyah = 1; openPlayer(prevId);
        }

        function handleAudioEnded() { if (isRepeat) { audio.currentTime = 0; audio.play(); } else playNext(); }

        function updatePlayPauseUI() {
            const icon = document.getElementById('play-pause-icon');
            if (isBuffering) icon.className = 'fa-solid fa-circle-notch animate-spin';
            else if (isPlaying) icon.className = 'fa-solid fa-pause';
            else icon.className = 'fa-solid fa-play';
        }

        function setupAudioListeners() {
            audio.addEventListener('timeupdate', () => {
                if (!audio.duration) return;
                document.getElementById('progress-bar').style.width = (audio.currentTime / audio.duration) * 100 + '%';
                document.getElementById('player-time-current').textContent = formatTime(audio.currentTime);
                document.getElementById('player-time-total').textContent = formatTime(audio.duration);
            });
        }

        function seekAudio(e) {
            if (!audio.duration) return;
            const rect = e.currentTarget.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        }

        function formatTime(sec) { if (isNaN(sec)) return '00:00'; const m = Math.floor(sec/60), s = Math.floor(sec%60); return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }
        function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('btn-shuffle').className = 'control-btn' + (isShuffle ? ' text-yellow-400' : ''); }
        function toggleRepeat() { isRepeat = !isRepeat; document.getElementById('btn-repeat').className = 'control-btn' + (isRepeat ? ' text-yellow-400' : ''); }
    </script>
</body>
    </html>
